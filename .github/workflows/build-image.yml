name: Build and Publish RatBot Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore solution
        run: dotnet restore RatBot.slnx

      - name: Build solution
        run: dotnet build RatBot.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test RatBot.slnx --no-build --configuration Release

      - name: Derive image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata and tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest-staging,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Resolve Docker build record ID
        id: build_record
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          artifacts_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts?per_page=100"
          build_record_artifact=""

          for _ in {1..6}; do
            response="$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$artifacts_url")"

            build_record_artifact="$(jq -r '.artifacts[]? | select(.name | endswith(".dockerbuild")) | .name' <<<"$response" | head -n1)"
            if [[ -n "$build_record_artifact" ]]; then
              break
            fi

            sleep 5
          done

          if [[ -z "$build_record_artifact" ]]; then
            echo "::warning::No .dockerbuild artifact found for this run; skipping build-record tag."
            echo "id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          build_record_id="${build_record_artifact##*~}"
          build_record_id="${build_record_id%.dockerbuild}"

          echo "id=${build_record_id}" >> "$GITHUB_OUTPUT"

      - name: Tag image with Docker build record ID
        if: steps.build_record.outputs.id != ''
        shell: bash
        run: |
          set -euo pipefail

          image_repo="${{ steps.image.outputs.name }}"
          build_record_id="${{ steps.build_record.outputs.id }}"
          digest="${{ steps.build.outputs.digest }}"

          docker buildx imagetools create \
            --tag "${image_repo}:${build_record_id}" \
            "${image_repo}@${digest}"

          {
            echo "### Build Record Tag"
            echo "- Added image tag: \`${image_repo}:${build_record_id}\`"
          } >> "$GITHUB_STEP_SUMMARY"
