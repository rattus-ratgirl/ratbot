name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore solution
        run: dotnet restore RatBot.slnx

      - name: Check SA1201 ordering
        run: dotnet sa1201ier . --check

      - name: Check CSharpier formatting
        run: dotnet csharpier check .

      - name: Build solution
        run: dotnet build RatBot.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test RatBot.slnx --no-build --configuration Release
