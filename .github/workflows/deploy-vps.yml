name: Deploy RatBot to VPS

on:
  workflow_run:
    workflows:
      - CI Tests
    types:
      - completed
    branches:
      - master
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - shared
          - production
          - staging
      image_tag:
        description: "Image tag or full image ref. Required for production. Optional for staging."
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_image: ${{ steps.resolve.outputs.build_image }}
      deploy: ${{ steps.resolve.outputs.deploy }}
      image_ref: ${{ steps.resolve.outputs.image_ref }}
      image_repo: ${{ steps.resolve.outputs.image_repo }}
      targets: ${{ steps.resolve.outputs.targets }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
      reason: ${{ steps.resolve.outputs.reason }}
    steps:
      - name: Resolve deployment plan
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
          WORKFLOW_EVENT: ${{ github.event.workflow_run.event || '' }}
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || '' }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha || '' }}
          WORKFLOW_HEAD_REPO: ${{ github.event.workflow_run.head_repository.full_name || '' }}
          INPUT_TARGET: ${{ github.event.inputs.target || '' }}
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag || '' }}
        run: |
          set -euo pipefail

          image_repo="ghcr.io/${GITHUB_REPOSITORY,,}"

          build_image="false"
          deploy="false"
          image_ref=""
          source_sha=""
          targets="[]"
          reason=""

          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            if [[ "$WORKFLOW_CONCLUSION" != "success" ]]; then
              reason="CI workflow did not succeed."
            elif [[ "$WORKFLOW_EVENT" != "push" ]]; then
              reason="Ignoring CI workflow not triggered by a push event."
            elif [[ "$WORKFLOW_HEAD_REPO" != "$GITHUB_REPOSITORY" ]]; then
              reason="Ignoring workflow run from different repository."
            elif [[ "$WORKFLOW_HEAD_BRANCH" == "master" ]]; then
              build_image="true"
              deploy="true"
              source_sha="$WORKFLOW_HEAD_SHA"
              image_ref="${image_repo}:sha-${source_sha}"
              targets="$(jq -cn --arg image_ref "$image_ref" '[
                {
                  target: "production",
                  environment_name: "production",
                  project: "ratbot-production",
                  remote_dir: "/opt/ratbot/production",
                  image_ref: $image_ref
                },
                {
                  target: "staging",
                  environment_name: "staging",
                  project: "ratbot-staging",
                  remote_dir: "/opt/ratbot/staging",
                  image_ref: $image_ref
                }
              ]')"
              reason="Build image and auto deploy production and staging after CI passes on master."
            else
              reason="Branch is not mapped to auto deployment."
            fi
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            case "$INPUT_TARGET" in
              shared)
                deploy="true"
                targets="$(jq -cn '[
                  {
                    target: "shared",
                    environment_name: "shared",
                    project: "ratbot-shared",
                    remote_dir: "/opt/ratbot/shared",
                    image_ref: ""
                  }
                ]')"
                reason="Manual shared deployment."
                ;;
              production)
                deploy="true"

                if [[ -z "$INPUT_IMAGE_TAG" ]]; then
                  deploy="false"
                  reason="Production deployment requires an explicit image_tag or full image ref."
                elif [[ "$INPUT_IMAGE_TAG" == *"/"* ]]; then
                  image_ref="$INPUT_IMAGE_TAG"
                else
                  image_ref="${image_repo}:${INPUT_IMAGE_TAG}"
                fi

                if [[ "$deploy" == "true" ]]; then
                  targets="$(jq -cn --arg image_ref "$image_ref" '[
                    {
                      target: "production",
                      environment_name: "production",
                      project: "ratbot-production",
                      remote_dir: "/opt/ratbot/production",
                      image_ref: $image_ref
                    }
                  ]')"
                  reason="Manual production deployment."
                fi
                ;;
              staging)
                deploy="true"

                tag="${INPUT_IMAGE_TAG:-latest-staging}"
                if [[ "$tag" == *"/"* ]]; then
                  image_ref="$tag"
                else
                  image_ref="${image_repo}:${tag}"
                fi
                targets="$(jq -cn --arg image_ref "$image_ref" '[
                  {
                    target: "staging",
                    environment_name: "staging",
                    project: "ratbot-staging",
                    remote_dir: "/opt/ratbot/staging",
                    image_ref: $image_ref
                  }
                ]')"
                reason="Manual staging deployment."
                ;;
              *)
                reason="Invalid manual target."
                ;;
            esac
          else
            reason="Unsupported event type."
          fi

          {
            echo "build_image=$build_image"
            echo "deploy=$deploy"
            echo "image_ref=$image_ref"
            echo "image_repo=$image_repo"
            echo "source_sha=$source_sha"
            echo "targets=$targets"
            echo "reason=$reason"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize resolved plan
        shell: bash
        env:
          BUILD_IMAGE: ${{ steps.resolve.outputs.build_image }}
          DEPLOY: ${{ steps.resolve.outputs.deploy }}
          IMAGE_REF: ${{ steps.resolve.outputs.image_ref }}
          TARGETS: ${{ steps.resolve.outputs.targets }}
          REASON: ${{ steps.resolve.outputs.reason }}
        run: |
          {
            echo "### Deployment Plan"
            echo "- Build image: \`${BUILD_IMAGE}\`"
            echo "- Deploy: \`${DEPLOY}\`"
            echo "- Image ref: \`${IMAGE_REF}\`"
            echo "- Targets: \`${TARGETS}\`"
            echo "- Reason: ${REASON}"
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    needs: prepare
    if: needs.prepare.outputs.build_image == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Derive image tags
        id: tags
        shell: bash
        env:
          IMAGE_REPO: ${{ needs.prepare.outputs.image_repo }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
        run: |
          set -euo pipefail

          {
            echo "tags<<EOF"
            echo "${IMAGE_REPO}:sha-${SOURCE_SHA}"
            echo "${IMAGE_REPO}:master"
            echo "${IMAGE_REPO}:latest-staging"
            echo "${IMAGE_REPO}:staging"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Summarize image
        shell: bash
        run: |
          {
            echo "### Image"
            echo "- Published image: \`${{ needs.prepare.outputs.image_ref }}\`"
            echo "- Moving tags: \`master\`, \`latest-staging\`, \`staging\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs:
      - prepare
      - build-and-push
    if: always() && needs.prepare.outputs.deploy == 'true' && (needs.prepare.outputs.build_image != 'true' || needs.build-and-push.result == 'success')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.targets) }}
    environment: ${{ matrix.environment_name }}
    concurrency:
      group: deploy-${{ matrix.target }}
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run remote deploy
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
          TARGET: ${{ matrix.target }}
          PROJECT: ${{ matrix.project }}
          REMOTE_DIR: ${{ matrix.remote_dir }}
          IMAGE_REF: ${{ matrix.image_ref }}
        run: |
          set -euo pipefail
          chmod +x ./scripts/deploy-vps-stack.sh

          args=(
            --stack "$TARGET"
            --project "$PROJECT"
            --remote-dir "$REMOTE_DIR"
          )

          if [[ -n "${IMAGE_REF}" ]]; then
            args+=(--image-ref "$IMAGE_REF")
          fi

          ./scripts/deploy-vps-stack.sh "${args[@]}"

      - name: Summarize deployment
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          PROJECT: ${{ matrix.project }}
          REMOTE_DIR: ${{ matrix.remote_dir }}
          IMAGE_REF: ${{ matrix.image_ref }}
        run: |
          {
            echo "### Deployment Result"
            echo "- Target: \`${TARGET}\`"
            echo "- Project: \`${PROJECT}\`"
            echo "- Remote dir: \`${REMOTE_DIR}\`"
            echo "- Image ref: \`${IMAGE_REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"
