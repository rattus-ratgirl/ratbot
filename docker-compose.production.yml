services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB__DATABASE}
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB__USER} -d ${DB__DATABASE}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_internal

  bot:
    image: ${RATBOT_IMAGE:-ratbot:production}
    pull_policy: always
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      DISCORD__TOKEN: ${DISCORD__TOKEN}
      DISCORD__GUILDID: ${DISCORD__GUILDID}
      DB__HOST: postgres
      DB__PORT: "5432"
      DB__DATABASE: ${DB__DATABASE}
      DB__USER: ${DB__USER}
      DB__PASSWORD: ${DB__PASSWORD}
      OTEL__LOGS__ENDPOINT: http://otel-collector:4317
      OTEL__LOGS__PROTOCOL: ${OTEL__LOGS__PROTOCOL:-grpc}
      OTEL__RESOURCE__SERVICE_NAME: ${OTEL__RESOURCE__SERVICE_NAME:-ratbot-production}
      OTEL__RESOURCE__ENVIRONMENT: ${OTEL__RESOURCE__ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_internal
      - observability

volumes:
  postgres_data:
    name: ratbot_production_postgres_data

networks:
  app_internal:
    name: ratbot_production_internal
  observability:
    external: true
    name: ratbot_observability
